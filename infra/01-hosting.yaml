AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Tokyo Building Blog - 配信インフラ。
  非公開S3 + CloudFront(OAC) + (任意で)ACM/独自ドメイン。
  独自ドメインを使う場合、CloudFront証明書の制約により本スタックは us-east-1 にデプロイすること。

Parameters:
  ProjectName:
    Type: String
    Default: tokyo-building-blog
  DomainName:
    Type: String
    Default: ''
    Description: 独自ドメイン(例 towers.example.com)。空ならCloudFrontの既定ドメインのみ。
  HostedZoneId:
    Type: String
    Default: ''
    Description: DomainNameのRoute53ホストゾーンID。指定時はACM(DNS検証)とAレコードを自動作成。

Conditions:
  HasCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Not [!Equals [!Ref HostedZoneId, '']]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${ProjectName}-site-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  # CloudFront -> S3 を OAC で限定許可
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${ProjectName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ディレクトリ形式(/path/ -> /path/index.html)へのURI書き換え
  RewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub '${ProjectName}-rewrite'
      AutoPublish: true
      FunctionConfig:
        Comment: Append index.html for directory-style URIs
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var req = event.request;
          var uri = req.uri;
          if (uri.endsWith('/')) {
            req.uri = uri + 'index.html';
          } else if (!uri.includes('.')) {
            req.uri = uri + '/index.html';
          }
          return req;
        }

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Ref ProjectName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_200
        Aliases: !If [HasCustomDomain, [!Ref DomainName], !Ref 'AWS::NoValue']
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref Certificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          # Managed-CachingOptimized
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 60

  # CloudFrontのみ S3 読み取りを許可
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  AliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt Distribution.DomainName
        # CloudFrontの固定ホストゾーンID
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
    Export:
      Name: !Sub '${ProjectName}-SiteBucketName'
  DistributionId:
    Value: !Ref Distribution
    Export:
      Name: !Sub '${ProjectName}-DistributionId'
  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
  SiteURL:
    Value: !If [HasCustomDomain, !Sub 'https://${DomainName}/', !Sub 'https://${Distribution.DomainName}/']
