AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Tokyo Building Blog - CI/CD と記事自動生成。
  CodeBuild(GitHub webhook)でAstroをビルドしS3へデプロイ + CloudFront無効化。
  EventBridge(定時) -> Lambda が seed から記事を生成し GitHub にコミット -> webhookでビルドが走る。
  ※ 01-hosting と別リージョン/別アカウントでも動くよう、バケット名と配信IDはパラメータ受け取り。

Parameters:
  ProjectName:
    Type: String
    Default: tokyo-building-blog
  SiteBucketName:
    Type: String
    Description: 01-hosting の出力 SiteBucketName
  DistributionId:
    Type: String
    Description: 01-hosting の出力 DistributionId
  SiteUrl:
    Type: String
    Description: 公開URL(末尾スラッシュなし)。canonical/sitemap/OGに使用。例 https://xxxx.cloudfront.net
  GitHubOwner:
    Type: String
  GitHubRepo:
    Type: String
  GitHubBranch:
    Type: String
    Default: main
  ContentDir:
    Type: String
    Default: site/src/content/buildings
  BuildSpecPath:
    Type: String
    Default: buildspec.yml
  Model:
    Type: String
    Default: claude-sonnet-4-6
  AnthropicSecretArn:
    Type: String
    Description: ANTHROPIC_API_KEY を格納した Secrets Manager の ARN
  GitHubTokenSecretArn:
    Type: String
    Description: コミット用 GitHub PAT を格納した Secrets Manager の ARN
  LambdaCodeS3Bucket:
    Type: String
    Description: generator のzipを置いたS3バケット
  LambdaCodeS3Key:
    Type: String
    Default: tokyo-building-blog/generator.zip
  ScheduleExpression:
    Type: String
    Default: cron(30 21 * * ? *)
    Description: UTC。既定は毎日 朝6:30 JST(=前日21:30 UTC)に1記事を生成・公開。

Resources:
  # ---------- CodeBuild (build & deploy) ----------
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: build-deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ['logs:CreateLogGroup', 'logs:CreateLogStream', 'logs:PutLogEvents']
                Resource: !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/codebuild/${ProjectName}*'
              - Effect: Allow
                Action: ['s3:ListBucket', 's3:GetBucketLocation']
                Resource: !Sub 'arn:aws:s3:::${SiteBucketName}'
              - Effect: Allow
                Action: ['s3:PutObject', 's3:DeleteObject', 's3:GetObject']
                Resource: !Sub 'arn:aws:s3:::${SiteBucketName}/*'
              - Effect: Allow
                Action: ['cloudfront:CreateInvalidation']
                Resource: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistributionId}'

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub '${ProjectName}-build'
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts: { Type: NO_ARTIFACTS }
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - { Name: SITE_BUCKET, Value: !Ref SiteBucketName }
          - { Name: DISTRIBUTION_ID, Value: !Ref DistributionId }
          - { Name: SITE_URL, Value: !Ref SiteUrl }
      Source:
        Type: GITHUB
        Location: !Sub 'https://github.com/${GitHubOwner}/${GitHubRepo}.git'
        BuildSpec: !Ref BuildSpecPath
      Triggers:
        Webhook: true
        FilterGroups:
          - - { Type: EVENT, Pattern: PUSH }
            - { Type: HEAD_REF, Pattern: !Sub '^refs/heads/${GitHubBranch}$' }
            - { Type: FILE_PATH, Pattern: '^site/' }

  # ---------- Lambda (記事自動生成) ----------
  GeneratorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: read-secrets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: [!Ref AnthropicSecretArn, !Ref GitHubTokenSecretArn]

  GeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${ProjectName}-generator'
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt GeneratorRole.Arn
      Timeout: 300
      MemorySize: 512
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Environment:
        Variables:
          GITHUB_OWNER: !Ref GitHubOwner
          GITHUB_REPO: !Ref GitHubRepo
          GITHUB_BRANCH: !Ref GitHubBranch
          CONTENT_DIR: !Ref ContentDir
          MODEL: !Ref Model
          ANTHROPIC_SECRET_ARN: !Ref AnthropicSecretArn
          GITHUB_TOKEN_SECRET_ARN: !Ref GitHubTokenSecretArn

  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${ProjectName}-daily'
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: generator
          Arn: !GetAtt GeneratorFunction.Arn

  SchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GeneratorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduleRule.Arn

Outputs:
  BuildProjectName:
    Value: !Ref BuildProject
  GeneratorFunctionName:
    Value: !Ref GeneratorFunction
